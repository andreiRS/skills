<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Companion</title>
  <!-- Loaded once. Fragments can use Tailwind utility classes and Chart.js. -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://fonts.bunny.net/css?family=inter:400,600,700|jetbrains-mono:400">
  <style>
    /* Brand tokens. One rule per element handles both modes via these vars. */
    :root {
      --bg: #1e1e1e; --surface: #252525; --border: #333333; --text: #ffffff;
      --success: #4caf7d; --info: #6b9bd2; --danger: #e05c4b; --highlight: #c9970a;
      --muted: #9a9a9a;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f0e8; --surface: #ede8df; --border: #ccc6bb; --text: #1a1a1a;
        --success: #3a8c63; --info: #4f7cb0; --danger: #c0432f; --highlight: #a87c08;
        --muted: #6b6b6b;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6;
      padding: 2.5rem; max-width: 880px; margin: 0 auto;
    }
    @media (max-width: 640px) { body { padding: 1.25rem; } }

    h2 { font-weight: 700; font-size: 1.5rem; margin-bottom: .4rem; }
    h3 { font-weight: 600; font-size: 1.05rem; margin-bottom: .2rem; }
    .subtitle { color: var(--muted); margin-bottom: 2rem; }
    code, pre { font-family: "JetBrains Mono", monospace; }

    /* Selectable options. Recommended = gold callout, selected = blue. */
    .options { display: flex; flex-direction: column; gap: 1rem; }
    .option {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.1rem 1.3rem; cursor: pointer; display: flex; gap: 1rem;
      align-items: flex-start; transition: border-color .15s;
    }
    .option:hover { border-color: var(--info); }
    .option.selected { border-color: var(--info); border-width: 2px; padding: calc(1.1rem - 1px) calc(1.3rem - 1px); }
    .option .letter {
      background: var(--bg); color: var(--muted); width: 1.8rem; height: 1.8rem;
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-weight: 600; flex-shrink: 0;
    }
    .option.selected .letter { background: var(--info); color: var(--bg); }
    .option .recommended { font-size: .7rem; color: var(--highlight); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .option p { color: var(--muted); font-size: .92rem; }

    /* Generic panel for charts, mockups, anything else. */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.3rem; margin-top: 1.75rem; }
    .card-title { color: var(--muted); font-size: .85rem; font-weight: 600; margin-bottom: .75rem; }
  </style>
</head>
<body>
  <div id="content">Waiting for the agent to push a screen...</div>
  <script>
    let last = "";
    function setContent(html) {
      const c = document.getElementById("content");
      c.innerHTML = html;
      // innerHTML does not run <script> tags; re-create them so charts render.
      c.querySelectorAll("script").forEach((old) => {
        const s = document.createElement("script");
        if (old.src) s.src = old.src; else s.textContent = old.textContent;
        old.replaceWith(s);
      });
    }
    async function poll() {
      try {
        const text = await (await fetch("/screen")).text();
        if (text !== last) { last = text; setContent(text); }
      } catch (e) {}
    }
    // Click highlights an option to help thinking; the human names it in the terminal.
    document.addEventListener("click", (e) => {
      const el = e.target.closest("[data-choice]");
      if (!el) return;
      el.parentElement.querySelectorAll("[data-choice]").forEach((o) => o.classList.remove("selected"));
      el.classList.add("selected");
    });
    setInterval(poll, 800);
    poll();
  </script>
</body>
</html>
